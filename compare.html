<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Depa — One-shot comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: rgb(245, 246, 252);
        --fg: rgb(20, 20, 26);
        --card: rgb(255, 255, 255);
        --primary: rgb(35, 180, 125);
        --muted: rgb(122, 122, 122);
        --border: rgb(228, 228, 228);
        --display: "Space Grotesk", sans-serif;
        --body: "Inter", sans-serif;
        --toolbar-h: 52px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: var(--body);
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
      }

      .toolbar {
        flex-shrink: 0;
        height: var(--toolbar-h);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 16px;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        z-index: 20;
      }

      .toolbar a {
        font-size: 13px;
        color: var(--muted);
        text-decoration: none;
        white-space: nowrap;
      }

      .toolbar a:hover {
        color: var(--primary);
      }

      .toolbar-title {
        font-family: var(--display);
        font-weight: 600;
        font-size: 14px;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      label.sync {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
      }

      .grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        min-height: 0;
        overflow: hidden;
      }

      .panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        border-right: 1px solid var(--border);
        background: var(--card);
      }

      .panel:last-child {
        border-right: none;
      }

      .panel-header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }

      .panel-label {
        font-family: var(--display);
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .panel-open {
        font-size: 12px;
        color: var(--primary);
        text-decoration: none;
        flex-shrink: 0;
      }

      .panel-open:hover {
        text-decoration: underline;
      }

      .panel iframe {
        flex: 1;
        width: 100%;
        border: none;
        min-height: 0;
        background: var(--bg);
      }

      /* Tablet: 2×2 */
      @media (max-width: 1200px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          grid-template-rows: repeat(2, minmax(0, 1fr));
          overflow: auto;
        }

        body {
          overflow: auto;
        }

        html,
        body {
          height: auto;
          min-height: 100%;
        }

        .panel {
          min-height: 50dvh;
        }
      }

      /* Mobile: stacked scroll */
      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
          grid-template-rows: none;
        }

        .panel {
          min-height: 75dvh;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .toolbar-title {
          font-size: 13px;
        }
      }

      .loading {
        padding: 48px 24px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header class="toolbar">
      <a href="/">← Menu</a>
      <span class="toolbar-title">One-shot comparison — same brief, four models</span>
      <div class="toolbar-actions">
        <label class="sync">
          <input type="checkbox" id="sync-scroll" checked />
          Sync scroll
        </label>
      </div>
    </header>

    <div class="grid" id="grid">
      <p class="loading">Loading versions…</p>
    </div>

    <script type="module">
      const grid = document.getElementById("grid");
      const syncCheckbox = document.getElementById("sync-scroll");
      let syncLock = false;
      let syncLockTimer = 0;

      /** Find the element that actually scrolls (deck vs document). */
      function getScrollTarget(doc) {
        const win = doc.defaultView;
        if (!win) return null;

        const docEl = doc.documentElement;
        const deck = doc.querySelector(".deck");

        if (deck) {
          const style = win.getComputedStyle(deck);
          const overflowY = style.overflowY;
          const deckScrolls =
            (overflowY === "auto" ||
              overflowY === "scroll" ||
              overflowY === "overlay") &&
            deck.scrollHeight > deck.clientHeight + 2;

          if (deckScrolls) {
            return { kind: "element", el: deck, win };
          }
        }

        return { kind: "document", el: docEl, win };
      }

      function scrollMax(target) {
        if (target.kind === "element") {
          return Math.max(0, target.el.scrollHeight - target.el.clientHeight);
        }
        return Math.max(
          0,
          target.el.scrollHeight - target.win.innerHeight
        );
      }

      function scrollTop(target) {
        if (target.kind === "element") {
          return target.el.scrollTop;
        }
        return target.win.scrollY ?? target.el.scrollTop;
      }

      function setScrollTop(target, value) {
        if (target.kind === "element") {
          target.el.scrollTop = value;
        } else {
          target.win.scrollTo(0, value);
        }
      }

      function scrollRatio(target) {
        const max = scrollMax(target);
        if (max <= 0) return 0;
        return scrollTop(target) / max;
      }

      function setupSyncScroll(iframes) {
        const targets = [];
        let wired = false;

        function wireScrollSync() {
          if (wired) return;
          const ready = iframes.every(
            (f) => f.contentDocument?.readyState === "complete"
          );
          if (!ready) return;
          wired = true;

          for (const iframe of iframes) {
            const doc = iframe.contentDocument;
            if (!doc) continue;

            const target = getScrollTarget(doc);
            if (!target) continue;

            targets.push(target);

            const onScroll = () => {
              if (!syncCheckbox.checked || syncLock) return;

              syncLock = true;
              clearTimeout(syncLockTimer);

              const ratio = scrollRatio(target);
              for (const other of targets) {
                if (other === target) continue;
                setScrollTop(other, ratio * scrollMax(other));
              }

              syncLockTimer = setTimeout(() => {
                syncLock = false;
              }, 80);
            };

            if (target.kind === "element") {
              target.el.addEventListener("scroll", onScroll, { passive: true });
            } else {
              target.win.addEventListener("scroll", onScroll, { passive: true });
            }
          }

          setTimeout(() => {
            if (!syncCheckbox.checked || targets.length < 2) return;
            const ratio = scrollRatio(targets[0]);
            for (let i = 1; i < targets.length; i++) {
              setScrollTop(targets[i], ratio * scrollMax(targets[i]));
            }
          }, 500);
        }

        for (const iframe of iframes) {
          iframe.addEventListener("load", wireScrollSync);
        }
        wireScrollSync();
      }

      fetch("/versions.json")
        .then((r) => r.json())
        .then((data) => {
          const items = data.oneShot?.items ?? [];
          if (items.length === 0) {
            grid.innerHTML =
              '<p class="loading">No one-shot versions found.</p>';
            return;
          }

          grid.innerHTML = items
            .map(
              (v) => `
            <div class="panel">
              <div class="panel-header">
                <span class="panel-label">${v.label}</span>
                <a class="panel-open" href="${v.path}" target="_blank" rel="noopener">Open ↗</a>
              </div>
              <iframe
                title="${v.label} deck"
                src="${v.path}"
              ></iframe>
            </div>`
            )
            .join("");

          const iframes = [...grid.querySelectorAll("iframe")];
          setupSyncScroll(iframes);
        })
        .catch(() => {
          grid.innerHTML =
            '<p class="loading">Could not load versions.</p>';
        });
    </script>
  </body>
</html>
